<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Quiniela Liga MX</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/styleAdmin.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="./img/logo-ligamx.png">
</head>
<body>
    <header>
        <nav>
            <a href="./index.html" class="nav-brand">
                <img src="./img/logo-ligamx.png" alt="Liga MX">
                <span>Quiniela MX</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./llenarQuiniela.html">Quiniela</a></li>
                <li><a href="./resultados.html">Resultados</a></li>
            </ul>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <section class="admin-container">
        <h1>Panel de Administración</h1>

        <!-- Contraseña -->
        <div class="admin-card">
            <h2><i class="fa-solid fa-lock"></i> Contraseña</h2>
            <div class="password-row">
                <input type="password" id="admin-password" placeholder="Contraseña de administrador"
                       onkeydown="if(event.key==='Enter') verificarAdmin()">
                <button class="btn-primary" onclick="verificarAdmin()">
                    <i class="fa-solid fa-arrow-right"></i> Continuar
                </button>
            </div>
            <p id="password-error" style="color:#f87171;margin:0.6rem 0 0;font-size:0.9rem;display:none;">
                <i class="fa-solid fa-circle-exclamation"></i> Contraseña incorrecta.
            </p>
        </div>

        <!-- Configurar Jornada -->
        <div class="admin-card" id="card-jornada" style="display:none">
            <h2 class="card-toggle" onclick="toggleAdminCard(this)">
                <span><i class="fa-solid fa-calendar-days"></i> Configurar Partidos de la Jornada</span>
                <i class="fa-solid fa-chevron-down card-chevron"></i>
            </h2>
            <div class="card-body">
                <div class="jornada-numero-row">
                    <label for="jornada-numero">Número de Jornada:</label>
                    <input type="number" id="jornada-numero" min="1" max="17" placeholder="Ej: 5">
                </div>
                <div id="partidos-admin"></div>
                <div class="admin-buttons">
                    <button class="btn-add" onclick="agregarPartido()">
                        <i class="fa-solid fa-plus"></i> Agregar partido
                    </button>
                    <button class="btn-primary" onclick="guardarJornada()">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Jornada
                    </button>
                </div>
            </div>
        </div>

        <!-- Actualizar Resultados -->
        <div class="admin-card" id="card-resultados" style="display:none">
            <h2 class="card-toggle" onclick="toggleAdminCard(this)">
                <span><i class="fa-solid fa-check-double"></i> Actualizar Resultados Oficiales</span>
                <i class="fa-solid fa-chevron-down card-chevron"></i>
            </h2>
            <div class="card-body">
                <p id="jornada-actual-info">Cargando jornada actual...</p>
                <div id="resultados-admin"></div>
                <div class="admin-buttons" style="margin-top:1rem">
                    <button class="btn-primary" onclick="guardarResultados()">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Resultados
                    </button>
                </div>
            </div>
        </div>

        <!-- Eliminar Quinielas -->
        <div class="admin-card" id="card-eliminar" style="display:none">
            <h2 class="card-toggle" onclick="toggleAdminCard(this)">
                <span><i class="fa-solid fa-trash"></i> Eliminar Quinielas</span>
                <i class="fa-solid fa-chevron-down card-chevron"></i>
            </h2>
            <div class="card-body">
                <div class="admin-buttons" style="margin-bottom:1.2rem">
                    <button class="btn-danger" onclick="borrarTodasQuinielas()">
                        <i class="fa-solid fa-trash-can"></i> Borrar TODAS las quinielas
                    </button>
                </div>
                <div id="quinielas-admin-list">
                    <p class="aviso"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/nav.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
