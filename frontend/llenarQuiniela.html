<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llenar | Quiniela Mundial 2026</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/styleLlenar.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="./img/mundial/logo-mundial_2026.png">
</head>
<body>
    <header>
        <nav>
            <a href="./index.html" class="nav-brand">
                <img src="./img/mundial/logo-mundial_2026.png" alt="Mundial 2026">
                <span>Quiniela 2026</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./llenarQuiniela.html" class="active">Quiniela</a></li>
                <li><a href="./resultados.html">Resultados</a></li>
            </ul>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <section class="section-form">

        <!-- Encabezado con título y barra de progreso -->
        <div class="form-header">
            <h1>Jornada</h1>
            <div class="progreso-wrap" id="progreso-wrap">
                <div class="progreso-label">
                    <span id="progreso-count">0</span>
                    <span id="progreso-total" class="progreso-sep">/0</span>
                    <span class="progreso-texto">seleccionados</span>
                </div>
                <div class="progreso-bar">
                    <div class="progreso-fill" id="progreso-fill"></div>
                </div>
            </div>
        </div>

        <!-- Lista de partidos -->
        <div class="form-partidos">
            <div class="partido-header">
                <div>Local</div>
                <div></div>
                <div>Visita</div>
            </div>
            <div id="partidos-form">
                <p class="aviso"><i class="fa-solid fa-spinner fa-spin"></i> Cargando partidos...</p>
            </div>
        </div>

        <!-- Footer sticky con nombre y enviar -->
        <div class="form-footer">
            <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off" required>
            <button id="btn-enviar" onclick="enviarQuiniela()">
                <i class="fa-solid fa-paper-plane"></i> Enviar Quiniela
            </button>
        </div>

    </section>

    <script src="./js/nav.js"></script>
    <script src="./js/scriptPartidos.js"></script>
    <script src="./js/agregarQuiniela.js"></script>
    <script src="./js/renderQuiniela.js"></script>
</body>
</html>
