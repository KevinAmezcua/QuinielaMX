<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados | Quiniela Liga MX</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/styleResultados.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="./img/logo-ligamx.png">
</head>
<body>
    <header>
        <nav>
            <a href="./index.html" class="nav-brand">
                <img src="./img/logo-ligamx.png" alt="Liga MX">
                <span>Quiniela MX</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./llenarQuiniela.html">Quiniela</a></li>
                <li><a href="./resultados.html" class="active">Resultados</a></li>
            </ul>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <section class="contenedor-tabla">
        <h1>Jornada</h1>

        <div class="vista-toggle" id="vista-toggle">
            <button class="toggle-btn activo" id="btn-cards" onclick="setVista('cards')">
                <i class="fa-solid fa-id-card"></i> Tarjetas
            </button>
            <button class="toggle-btn" id="btn-tabla" onclick="setVista('tabla')">
                <i class="fa-solid fa-table"></i> Tabla
            </button>
        </div>

        <div id="tabla-container" class="tabla-wrapper">
            <table class="results-table">
                <tr class="tr-header">
                    <th class="col-sticky-left">Participantes</th>
                </tr>
                <tbody id="quiniela"></tbody>
            </table>
        </div>

        <div id="cards-container" class="cards-container"></div>
    </section>

    <section class="historial-section" id="historial-section" style="display:none">
        <h2 class="historial-titulo"><i class="fa-solid fa-clock-rotate-left"></i> Historial</h2>
        <div id="historial-container">
            <p class="aviso"><i class="fa-solid fa-spinner fa-spin"></i> Cargando historial...</p>
        </div>
    </section>

    <script src="./js/nav.js"></script>
    <script src="./js/obtenerQuinielasTabla.js"></script>
</body>
</html>
