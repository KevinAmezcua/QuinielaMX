<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados | Quiniela Mundial 2026</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/styleResultados.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="./img/mundial/logo-mundial_2026.png">
</head>
<body>
    <header>
        <nav>
            <a href="./index.html" class="nav-brand">
                <img src="./img/mundial/logo-mundial_2026.png" alt="Mundial 2026">
                <span>Quiniela 2026</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./llenarQuiniela.html">Quiniela</a></li>
                <li><a href="./resultados.html" class="active">Resultados</a></li>
            </ul>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <!-- Banner recordatorio de pago -->
    <div class="pago-recordatorio" id="pago-recordatorio">
        <div class="pago-recordatorio-contenido">
            <i class="fa-solid fa-triangle-exclamation pago-recordatorio-icono"></i>
            <div class="pago-recordatorio-texto">
                <strong>¿Ya pagaste tu quiniela?</strong>
                <span>Tu participación solo cuenta si tu pago fue confirmado. Envía tu comprobante al <strong>311-268-24-06</strong>.</span>
            </div>
        </div>
        <button class="pago-recordatorio-cerrar" onclick="cerrarRecordatorio()" aria-label="Cerrar">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <section class="contenedor-tabla">
        <h1>Jornada</h1>

        <div class="vista-toggle" id="vista-toggle">
            <button class="toggle-btn activo" id="btn-cards" onclick="setVista('cards')">
                <i class="fa-solid fa-id-card"></i> Tarjetas
            </button>
            <button class="toggle-btn" id="btn-tabla" onclick="setVista('tabla')">
                <i class="fa-solid fa-table"></i> Tabla
            </button>
        </div>

        <div id="tabla-container" class="tabla-wrapper">
            <table class="results-table">
                <tr class="tr-header">
                    <th class="col-sticky-left">Participantes</th>
                </tr>
                <tbody id="quiniela"></tbody>
            </table>
        </div>

        <div id="cards-container" class="cards-container"></div>
    </section>

    <section class="historial-section" id="historial-section" style="display:none">
        <h2 class="historial-titulo"><i class="fa-solid fa-clock-rotate-left"></i> Historial</h2>
        <div id="historial-container">
            <p class="aviso"><i class="fa-solid fa-spinner fa-spin"></i> Cargando historial...</p>
        </div>
    </section>

    <script src="./js/config.js"></script>
    <script src="./js/nav.js"></script>
    <script src="./js/obtenerQuinielasTabla.js"></script>
    <script>
        if (localStorage.getItem('pagoConfirmado') === '1') {
            document.getElementById('pago-recordatorio').style.display = 'none';
        }
        function cerrarRecordatorio() {
            localStorage.setItem('pagoConfirmado', '1');
            const el = document.getElementById('pago-recordatorio');
            el.style.opacity = '0';
            el.style.transform = 'translateY(-8px)';
            setTimeout(() => el.style.display = 'none', 250);
        }
    </script>
</body>
</html>
